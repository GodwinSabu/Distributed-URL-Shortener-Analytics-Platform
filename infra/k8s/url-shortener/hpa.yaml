apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: url-shortener-hpa
  namespace: url-shortener
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       url-shortener

  minReplicas: 3
  maxReplicas: 20

  metrics:
    # Scale on CPU — redirect handler is CPU-bound
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 60

    # Scale on memory too
    - type: Resource
      resource:
        name: memory
        target:
          type:               Utilization
          averageUtilization: 70

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    # react fast to traffic spikes
      policies:
        - type:          Pods
          value:         4              # add up to 4 pods at a time
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300   # be conservative scaling down
      policies:
        - type:          Pods
          value:         1
          periodSeconds: 60