apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener
  namespace: url-shortener
  labels:
    app: url-shortener
spec:
  replicas: 3
  selector:
    matchLabels:
      app: url-shortener
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:        1
      maxUnavailable:  0     # zero-downtime deployments
  template:
    metadata:
      labels:
        app: url-shortener
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "3000"
        prometheus.io/path:   "/metrics"
    spec:
      # Spread pods across nodes for HA
      topologySpreadConstraints:
        - maxSkew:           1
          topologyKey:       kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: url-shortener

      containers:
        - name: url-shortener
          image: your-ecr-registry/url-shortener:latest
          ports:
            - containerPort: 3000
              name: http

          envFrom:
            - configMapRef:
                name: url-shortener-config
            - secretRef:
                name: url-shortener-secrets

          # Override NODE_ID per pod using the pod name
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

          resources:
            requests:
              cpu:    "250m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "512Mi"

          # Readiness: only send traffic when app is ready
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds:       10
            failureThreshold:    3

          # Liveness: restart if app hangs
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds:       20
            failureThreshold:    3

          lifecycle:
            preStop:
              exec:
                # Give in-flight requests 10s to complete before SIGTERM
                command: ["/bin/sleep", "10"]