# In production: use AWS Secrets Manager + external-secrets operator
# For now: base64-encode your values and put them here
# kubectl create secret generic url-shortener-secrets \
#   --from-literal=DATABASE_URL='postgresql://...' \
#   --from-literal=REDIS_URL='redis://...' \
#   --from-literal=KAFKA_BROKERS='kafka:9092' \
#   --from-literal=CLICKHOUSE_URL='http://clickhouse:8123' \
#   --from-literal=CLICKHOUSE_USER='chuser' \
#   --from-literal=CLICKHOUSE_PASSWORD='chpass' \
#   -n url-shortener --dry-run=client -o yaml > secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: url-shortener-secrets
  namespace: url-shortener
type: Opaque
data:
  DATABASE_URL:        ""   # base64 of your value
  REDIS_URL:           ""
  KAFKA_BROKERS:       ""
  CLICKHOUSE_URL:      ""
  CLICKHOUSE_USER:     ""
  CLICKHOUSE_PASSWORD: ""